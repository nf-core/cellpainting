repository_type: pipeline

nf_core_version: 3.2.1

lint:
  files_exist:
    - conf/igenomes.config
    - conf/igenomes_ignored.config
    - conf/igenomes.config
    - conf/igenomes_ignored.config
  template_strings:
    - assets/cellprofiler/illumination.cppipe.jinja
    - modules/local/cellprofiler/illuminationcorrection/main.nf
  nextflow_config:
    - config_defaults:
        - params.cellprofiler_illumination_cppipe
        - params.cellprofiler_analysis_cppipe
        - params.cellprofiler_assaydevelopment_cppipe

template:
  org: nf-core
  name: cellpainting
  description: A wonderful pipeline for cell painting
  author: Erin, Dave, Jenna
  version: 1.0.0dev
  force: true
  outdir: .
  skip_features:
    - igenomes
    - fastqc
  is_nfcore: true
