name: cytotable
description: Converting cellprofiler output csv files to parquet file
keywords:
  - CellProfiler
  - CytoTable
  - parquet
tools:
  - cytotable:
      description: |
        Transform CellProfiler and DeepProfiler data for processing image-based profiling readouts with Pycytominer and other Cytomining tools.
        documentation: https://github.com/cytomining/CytoTable/
input:
  - - cellprofiler_output:
        type: file
        description: |
          Directory containing the output CSV files from CellProfiler: Cells.csv, Cytoplasm.csv, Experiment.csv, Image.csv, Nuclei.csv
output:
  - report:
      - "*.parquet":
          type: file
          description: parquet file format.
  - stats:
      - "*_stats.json":
          type: file
          description: |
            JSON file containing per-parquet QC counts: num_cells (row count),
            num_channels (distinct intensity channels detected via
            Cells_Intensity_MeanIntensity_* column names), num_columns (total
            column count), and a metadata echo of batch, plate, well, and site.
authors:
  - "@ybaeus"
