name: cytotable_metadata
description: Extract metadata from CytoTable parquet files and export to JSON
keywords:
  - CellProfiler
  - CytoTable
  - parquet
  - metadata
  - JSON
  - marimo
tools:
  - cytotable:
      description: |
        Transform CellProfiler and DeepProfiler data for processing image-based profiling readouts with Pycytominer and other Cytomining tools.
      documentation: https://github.com/cytomining/CytoTable/
  - marimo:
      description: |
        Reactive Python notebook that runs as an app.
      documentation: https://marimo.io/
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [batch: 'batch1', plate: 'plate1', well: 'A01', site: '1']
  - - parquet_file:
        type: file
        description: |
          Parquet file generated by CytoTable containing Cell Painting data
output:
  - app:
      - "*_metadata.py":
          type: file
          description: Marimo app with metadata analysis
  - json:
      - "*_metadata.json":
          type: file
          description: JSON file containing extracted metadata
  - notebook:
      - "*_metadata.ipynb":
          type: file
          description: Jupyter notebook exported from Marimo app (optional)
  - html:
      - "*.html":
          type: file
          description: HTML report (optional)
  - versions:
      - "versions.yml":
          type: file
          description: File containing software versions
authors:
  - "@ybaeus"
