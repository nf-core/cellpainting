name: cytotable_descriptivestats
description: Generate descriptive statistics and visualizations for CytoTable parquet files
keywords:
  - CellProfiler
  - CytoTable
  - parquet
  - statistics
  - visualization
tools:
  - cytotable:
      description: |
        Transform CellProfiler and DeepProfiler data for processing image-based profiling readouts with Pycytominer and other Cytomining tools.
      documentation: https://github.com/cytomining/CytoTable/
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [batch: 'batch1', plate: 'plate1', well: 'A01', site: '1']
  - - parquet_file:
        type: file
        description: |
          Parquet file generated by CytoTable containing Cell Painting data
output:
  - notebook:
      - "*.ipynb":
          type: file
          description: Executed Jupyter notebook with descriptive statistics and visualizations
  - stats:
      - "*_descriptive_stats.parquet":
          type: file
          description: Parquet file containing descriptive statistics for all numeric columns
  - size_plot:
      - "*_size_distributions.png":
          type: file
          description: Cell, nuclear, and cytoplasm size distribution plots (optional, depends on available columns)
  - dna_plot:
      - "*_dna_intensity.png":
          type: file
          description: DNA intensity distribution plot (optional, depends on available columns)
  - html:
      - "*.html":
          type: file
          description: HTML report (optional)
  - versions:
      - "versions.yml":
          type: file
          description: File containing software versions
authors:
  - "@ybaeus"
